<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <main class="main-content flex-grow-1">
        <section class="py-5">
            <div class="container py-4 text-center">
                <i class="bi bi-exclamation-circle display-1 text-advertencia mb-4"></i>
                <h2 class="fw-bolder text-corporativo mb-3">Ha ocurrido un error</h2>

    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>

</html>
