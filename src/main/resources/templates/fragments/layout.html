<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Farma - Sistema de Gestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/temas.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-corporativo fixed-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-hospital me-2"></i>Nova Farma
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Inicio</a>
                </li>

                    <a class="nav-link" th:href="@{/inventario}"><i class="bi bi-box-seam me-1"></i>Inventario</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/alertas}"><i class="bi bi-exclamation-triangle me-1"></i>Alertas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/registro}"><i class="bi bi-pencil-square me-1"></i>Registro</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-corporativo text-white py-4 text-center mt-auto">
    <div class="container">
        <p class="mb-0"><i class="bi bi-hospital me-2"></i>Nova Farma &copy; 2026 - Sistema de Gestion</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
