<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="main-content flex-grow-1">
        <section class="py-5 bg-light">
            <div class="container py-4">
                <h2 class="mb-4 fw-bolder text-corporativo">Inventario de Productos</h2>
                <p class="text-muted mb-4">Catalogo general de medicamentos y productos.</p>

                <div class="table-container bg-white rounded shadow-sm border">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light text-muted">
                                <tr>
                                    <th class="fw-normal py-3 px-4">Producto</th>
                                    <th class="fw-normal py-3">Categoria</th>
                                    <th class="fw-normal py-3 text-center">Stock</th>
                                    <th class="fw-normal py-3 text-end">Precio</th>
                                    <th class="fw-normal py-3 text-center">Vencimiento</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="producto : ${productos}" th:classappend="${producto.stock < 10} ? 'table-row-advertencia' : ''">
                                    <td class="px-4 py-3">
                                        <div class="fw-bold text-dark" th:text="${producto.nombre}">Nombre</div>
                                        <small class="text-muted" th:text="'Lote: ' + ${producto.lote}">Lote</small>
                                    </td>
                                    <td>
                                        <span class="badge bg-light text-dark border px-2 py-1 fw-normal" th:text="${producto.categoria}">Categoria</span>
                                    </td>
                                    <td class="text-center">
                                        <span class="fw-bold" th:text="${producto.stock}" th:classappend="${producto.stock < 10} ? 'text-advertencia' : ''">0</span>
                                        <i th:if="${producto.stock < 10}" class="bi bi-exclamation-triangle text-advertencia ms-1" title="Poco stock"></i>
                                    </td>
                                    <td class="text-end fw-bold" th:text="'S/ ' + ${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</td>
                                    <td class="text-center" th:text="${#temporals.format(producto.fechaVencimiento, 'dd/MM/yyyy')}">01/01/2026</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
